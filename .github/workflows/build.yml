name: Build

on:
  push:
    branches: [main, feature/**]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore tests
        run: dotnet restore AeroSSH.Tests/AeroSSH.Tests.csproj
      - name: Run tests
        run: dotnet test AeroSSH.Tests/AeroSSH.Tests.csproj --no-restore --logger "trx;LogFileName=test-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: AeroSSH.Tests/TestResults/

  build-apk:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install Android workload
        run: dotnet workload install android
      - name: Restore
        run: dotnet restore AeroSSH/AeroSSH.csproj
      - name: Build (Release)
        run: dotnet publish AeroSSH/AeroSSH.csproj -c Release -f net10.0-android --no-restore
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aerossh-apk
          path: AeroSSH/bin/Release/net10.0-android/publish/*-Signed.apk
          if-no-files-found: error
